<!-- Hidden data carriers for JS re-read after HTMX swap -->
<span id="chart-category-data" data-json='{{ by_category_json|safe }}'></span>
<span id="chart-day-data"      data-json='{{ by_day_json|safe }}'></span>

<div class="section-card chart-card" id="card-pie">
  <h2 class="section-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
      <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>
    </svg>
    Gastos por categoría
  </h2>
  <div class="chart-wrapper">
    <canvas id="chart-pie"></canvas>
  </div>
</div>

<div class="section-card chart-card" id="card-line">
  <h2 class="section-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    Evolución de gastos
  </h2>
  <div class="chart-wrapper">
    <canvas id="chart-line"></canvas>
  </div>
</div>
