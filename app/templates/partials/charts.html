<!-- Hidden data carriers for JS re-read after HTMX swap -->
<span id="chart-category-data" data-json='{{ by_category_json|safe }}'></span>
<span id="chart-day-data"      data-json='{{ by_day_json|safe }}'></span>
<span id="chart-flow-data"     data-json='{{ monthly_flow_json|safe }}'></span>
<span id="chart-portfolio-data" data-json='{{ portfolio_json|safe }}'></span>

<!-- Gráfico 1: Distribución por Categorías (Anillo) -->
<div class="section-card chart-card" id="card-pie">
  <h2 class="section-title">
    {% include 'components/icons/icon_pie_chart.svg' %}
    Egresos por categoría
  </h2>
  <div class="chart-wrapper">
    <canvas id="chart-pie"></canvas>
  </div>
</div>

<!-- Gráfico 2: Composición Multidivisa (Barras Apiladas ARS vs USD) -->
<div class="section-card chart-card" id="card-portfolio">
  <h2 class="section-title">
    {% include 'components/icons/icon_bar_chart.svg' %}
    Egresos
  </h2>
  <div class="chart-wrapper">
    <canvas id="chart-portfolio"></canvas>
  </div>
</div>

<!-- Gráfico 3: Flujo Ingresos vs Egresos (Barras Agrupadas) -->
<div class="section-card chart-card chart-card--wide" id="card-flow">
  <h2 class="section-title">
    {% include 'components/icons/icon_activity.svg' %}
    Flujo mensual — Ingresos vs Egresos
  </h2>
  <div class="chart-wrapper chart-wrapper--tall">
    <canvas id="chart-flow"></canvas>
  </div>
</div>
