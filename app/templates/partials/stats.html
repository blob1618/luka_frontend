<div class="stats-grid">
  <div class="stat-card" id="stat-total">
    <div class="stat-icon" style="--icon-color: #6366f1;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
    </div>
    <div class="stat-body">
      <p class="stat-label">Total gastado</p>
      <p class="stat-value">${{ "%.2f"|format(stats.total_spent) }}</p>
    </div>
  </div>

  <div class="stat-card" id="stat-count">
    <div class="stat-icon" style="--icon-color: #8b5cf6;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
    </div>
    <div class="stat-body">
      <p class="stat-label">Transacciones</p>
      <p class="stat-value">{{ stats.transaction_count }}</p>
    </div>
  </div>

  <div class="stat-card" id="stat-category">
    <div class="stat-icon" style="--icon-color: #ec4899;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
        <line x1="7" y1="7" x2="7.01" y2="7"/>
      </svg>
    </div>
    <div class="stat-body">
      <p class="stat-label">Categoría top</p>
      <p class="stat-value">{{ stats.top_category }}</p>
    </div>
  </div>

  <div class="stat-card" id="stat-avg">
    <div class="stat-icon" style="--icon-color: #14b8a6;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </div>
    <div class="stat-body">
      <p class="stat-label">Promedio/día</p>
      <p class="stat-value">${{ "%.2f"|format(stats.avg_per_day) }}</p>
    </div>
  </div>
</div>
