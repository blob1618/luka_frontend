{% if transactions %}
<div class="tx-list">
  {% for tx in transactions %}
  <div class="tx-row" id="tx-{{ tx.id }}">
    <div class="tx-cat-icon" style="background: {{ tx.color }}22; color: {{ tx.color }};">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
        <line x1="7" y1="7" x2="7.01" y2="7"/>
      </svg>
    </div>
    <div class="tx-info">
      <p class="tx-description">{{ tx.description }}</p>
      <p class="tx-meta">
        <span class="tx-category" style="color: {{ tx.color }};">{{ tx.category }}</span>
        · {{ tx.date }} a las {{ tx.time }}
      </p>
    </div>
    <div class="tx-amount">-${{ "%.2f"|format(tx.amount) }}</div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="empty-state" id="empty-transactions">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
    <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
  </svg>
  <p>Sin transacciones en este período.</p>
  <p class="empty-hint">Enviá gastos a LUKA por WhatsApp para verlos acá.</p>
</div>
{% endif %}
